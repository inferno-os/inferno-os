\* TLC Model Checking Configuration for Namespace Specification
\*
\* Run with: tlc MC_Namespace.tla -config MC_Namespace.cfg
\*
\* Configurations:
\*   small:  2 processes, 4 pgrps, 6 channels, 2 paths (~minutes)
\*   medium: 3 processes, 5 pgrps, 8 channels, 3 paths (~hours)
\*   large:  3 processes, 6 pgrps, 10 channels, 3 paths (~days)
\*
\* Current: small (default for CI; use run-verification.sh for larger)

\* =========================================================================
\* SPECIFICATION
\* =========================================================================

SPECIFICATION Spec

\* =========================================================================
\* CONSTANTS
\* =========================================================================

\* Small configuration: targets 10^4-10^5 states
\* Each pgrp needs 2 channels (slash/dot), so MaxChannels >= 2*MaxPgrps
CONSTANT MC_MaxProcesses = 2
CONSTANT MC_MaxPgrps = 4
CONSTANT MC_MaxChannels = 6
CONSTANT MC_MaxPaths = 2
CONSTANT MC_MaxMountId = 4

\* =========================================================================
\* INVARIANTS
\* =========================================================================

\* Type correctness
INVARIANT TypeOK

\* Core safety
INVARIANT SafetyInvariant

\* Reference counting
INVARIANT RefCountNonNegative
INVARIANT NoUseAfterFree
INVARIANT ActivePgrpRefCount

\* Mount table consistency
INVARIANT MountTableBounded
INVARIANT MountedChannelsExist

\* Namespace isolation (KEY SECURITY PROPERTIES)
INVARIANT NamespaceIsolation
INVARIANT NamespaceIsolationTheorem
INVARIANT UnilateralMountNonPropagation
INVARIANT CopyFidelity
INVARIANT PostCopyMountsSound
INVARIANT NoIsolationViolation

\* =========================================================================
\* PROPERTIES (Temporal)
\* =========================================================================

\* Mount locality - each step modifies at most one pgrp
PROPERTY MountLocalityProperty

\* Progress
PROPERTY Progress

\* =========================================================================
\* CONSTRAINT
\* =========================================================================

CONSTRAINT StateConstraint

\* =========================================================================
\* ACTION CONSTRAINT
\* =========================================================================

ACTION_CONSTRAINT ActionConstraint

\* =========================================================================
\* ALIAS (for debugging error traces)
\* =========================================================================

ALIAS Alias
