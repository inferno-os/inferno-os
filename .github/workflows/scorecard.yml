name: OSSF Scorecard

on:
  push:
    branches: [ master ]
  schedule:
    # Weekly on Mondays at 2am UTC
    - cron: '0 2 * * 1'

permissions: {}

jobs:
  scorecard:
    name: Supply Chain Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Run OSSF Scorecard
      uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
      with:
        results_file: scorecard-results.sarif
        results_format: sarif
        # Publish results to the repository's Security tab
        publish_results: true
        # Fine-grained PAT with admin:read to check branch protection
        repo_token: ${{ secrets.SCORECARD_TOKEN }}

    - name: Upload Scorecard SARIF
      uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v3
      with:
        sarif_file: scorecard-results.sarif

    - name: Upload Scorecard results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: scorecard-results
        path: scorecard-results.sarif
        retention-days: 30
