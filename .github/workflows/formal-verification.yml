name: Formal Verification

on:
  push:
    branches: [ master ]
    paths:
      - 'formal-verification/**'
      - 'emu/port/pgrp.c'
      - 'emu/port/chan.c'
      - 'emu/port/dat.h'
      - '.github/workflows/formal-verification.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'formal-verification/**'
      - 'emu/port/pgrp.c'
      - 'emu/port/chan.c'
      - 'emu/port/dat.h'
      - '.github/workflows/formal-verification.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # SPIN Model Checking
  # ─────────────────────────────────────────────
  spin-verification:
    name: SPIN Model Checking
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Install SPIN
      run: |
        sudo apt-get update
        sudo apt-get install -y spin=6.5.2+dfsg-1 gcc

    - name: Verify SPIN version
      run: spin -V

    - name: Run SPIN verification (quick mode)
      run: |
        cd formal-verification/spin
        chmod +x verify-all.sh
        ./verify-all.sh quick

    - name: Upload SPIN results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: spin-results
        path: /tmp/spin_*.log
        retention-days: 14

  # ─────────────────────────────────────────────
  # CBMC Bounded Model Checking
  # ─────────────────────────────────────────────
  cbmc-verification:
    name: CBMC Verification
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Install CBMC
      run: |
        sudo apt-get update
        sudo apt-get install -y cbmc=5.95.1-4ubuntu1

    - name: Verify CBMC version
      run: cbmc --version

    - name: Run CBMC verification (quick mode)
      run: |
        cd formal-verification/cbmc
        chmod +x verify-all.sh
        ./verify-all.sh quick

    - name: Upload CBMC results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: cbmc-results
        path: /tmp/cbmc_*.log
        retention-days: 14
