      run: |
        chmod +x tests/host/jit_boot_test.sh
        SDL_VIDEODRIVER=dummy tests/host/jit_boot_test.sh

    - name: Upload Linux GUI build artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
